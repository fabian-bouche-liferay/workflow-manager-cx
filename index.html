<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Workflow Manager CX App</title>

    <script type="text/javascript">

      (function () {
          if (!window.Liferay) {
              window.Liferay = {};
          }
          
          if (!window.Liferay.Util) {
              window.Liferay.Util = {};
          }

          if (!window.Liferay.Icons) {
              window.Liferay.Icons = {};
          }

          window.Liferay.Util.fetch = function (url, options = {}) {
              const basicAuth = "Basic " + btoa("test@liferay.com:test");

              const headers = new Headers(options.headers || {});
              headers.set("Authorization", basicAuth);

              return fetch(url, {
                  ...options,
                  headers,
              });
          };

          if (!window.Liferay.ThemeDisplay) {
            window.Liferay.ThemeDisplay = {};
            window.Liferay.ThemeDisplay.getLanguageId = () => {return "fr_FR";};
            window.Liferay.ThemeDisplay.getLayoutRelativeURL = () => {return "/o/workflow-manager-cx";};
            window.Liferay.ThemeDisplay.getPortalURL = () => {return "http://localhost:8080"}
          }

          window.Liferay.Icons.spritemap = "/o/workflow-manager-cx/icons.svg";
      })();

    </script>

  </head>
  <body>

    <script type="module" src="/src/index.jsx"></script> 

    <noscript>You need to enable JavaScript to run this app.</noscript>

    <workflow-manager>
    </workflow-manager>

  </body>
</html>
